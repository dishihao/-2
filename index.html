<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#14532d"><title>标本分类助手</title><link rel="manifest" href="manifest.webmanifest"><style>
:root{--g:#14532d;--g2:#166534;--bg:#f5f7f5;--line:#d7dce0;--muted:#6b7280}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;color:#111827}body{padding-bottom:78px}button,input,select,textarea{font:inherit}.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--g),#0f766e);color:white;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;box-shadow:0 2px 12px #0002}.toprow{display:flex;justify-content:space-between;gap:10px;align-items:center}.title{font-size:21px;font-weight:800}.sub,.save{font-size:12px;opacity:.92;margin-top:3px}.dataBtn{border:1px solid #ffffff66;color:white;background:#ffffff1f;border-radius:12px;padding:9px 12px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}.stat{text-align:center;background:#ffffff1c;border:1px solid #ffffff2e;border-radius:12px;padding:8px}.stat b{display:block;font-size:20px}.stat span{font-size:11px}.main{max-width:820px;margin:auto;padding:12px}.search{position:sticky;top:151px;z-index:10;background:white;border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:8px}.search input{flex:1;border:0;outline:0;min-width:0;font-size:16px}.btn{border:1px solid var(--line);background:white;border-radius:10px;padding:9px 11px}.chips{display:flex;gap:8px;overflow:auto;padding:10px 0 2px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:8px 11px;color:#374151}.chip.on{background:var(--g);border-color:var(--g);color:white}.head{display:flex;justify-content:space-between;align-items:center;margin:12px 2px 8px}.head h2{font-size:17px;margin:0}.head small{color:var(--muted)}.list{display:grid;gap:9px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:12px;box-shadow:0 1px 4px #0000000b}.ctop{display:flex;justify-content:space-between;gap:10px}.name{font-weight:800;font-size:17px}.src{font-size:12px;color:var(--muted);margin-top:2px}.tag{border-radius:999px;padding:5px 9px;font-size:12px;white-space:nowrap}.pending{background:#fef3c7;color:#92400e}.done{background:#dcfce7;color:var(--g2)}.meta{font-size:13px;line-height:1.7;margin-top:7px}.primary{width:100%;margin-top:9px;border:0;border-radius:11px;background:var(--g2);color:white;font-weight:700;padding:11px}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fffffff5;border-top:1px solid var(--line);padding:6px 6px calc(6px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr)}.nav{border:0;background:transparent;border-radius:11px;padding:7px 2px;color:#6b7280;font-size:12px}.nav b{display:block;font-size:18px}.nav.on{color:var(--g2);background:#ecfdf5}.mask{display:none;position:fixed;inset:0;z-index:50;background:#0007;align-items:flex-end}.mask.show{display:flex}.sheet{width:100%;max-height:92vh;overflow:auto;background:white;border-radius:22px 22px 0 0;padding:16px 16px calc(18px + env(safe-area-inset-bottom))}.handle{width:44px;height:5px;background:#d1d5db;border-radius:9px;margin:0 auto 12px}.field{margin:13px 0}.field label{display:block;font-weight:700;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;font-size:16px;padding:12px;border:1px solid var(--line);border-radius:12px;background:white}.field textarea{min-height:70px}.hint{font-size:12px;color:var(--muted);margin-top:5px}.actions{display:flex;gap:8px;position:sticky;bottom:0;background:white;padding-top:9px}.actions button{border-radius:11px;padding:11px;border:1px solid var(--line);background:white}.actions .savebtn{flex:1;background:var(--g2);color:white;border-color:var(--g2);font-weight:700}.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tool{text-align:left;border:1px solid var(--line);background:white;border-radius:14px;padding:14px}.tool b{display:block}.tool span{font-size:12px;color:var(--muted)}.toast{display:none;position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:80;background:#111827;color:white;padding:10px 14px;border-radius:99px}.toast.show{display:block}.empty{text-align:center;color:var(--muted);padding:40px}.hidden{display:none}@media(min-width:700px){.list{grid-template-columns:1fr 1fr}.mask{align-items:center;justify-content:center}.sheet{max-width:550px;border-radius:22px;max-height:88vh}}
</style></head><body>
<header class="top"><div class="toprow"><div><div class="title">标本分类助手</div><div class="sub">全部809种标本 · 分类上架与快速查找</div><div id="save" class="save">正在恢复历史数据…</div></div><button class="dataBtn" onclick="openTools()">数据</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>总品种</span></div><div class="stat"><b id="pending">0</b><span>待分类</span></div><div class="stat"><b id="done">0</b><span>已分类</span></div></div></header>
<main class="main"><div class="search">🔎<input id="q" placeholder="搜索品名、拼音、类别或位置"><button class="btn" onclick="q.value='';render()">清空</button></div><div id="cats" class="chips"></div><div id="sources" class="chips"></div><div class="head"><h2 id="viewTitle">待分类</h2><small id="count"></small></div><div id="list" class="list"></div></main>
<nav class="bottom"><button class="nav on" data-v="pending" onclick="setView('pending')"><b>📦</b>待分类</button><button class="nav" data-v="done" onclick="setView('done')"><b>✅</b>已分类</button><button class="nav" data-v="all" onclick="setView('all')"><b>🔍</b>全部查找</button><button class="nav" data-v="location" onclick="setView('location')"><b>🗄️</b>按位置</button></nav>
<div id="editMask" class="mask" onclick="maskClose(event,'editMask')"><div class="sheet"><div class="handle"></div><h2 id="editName" style="margin:0"></h2><div id="suggest" class="hint"></div><input id="editId" type="hidden"><div class="field"><label>药材类别</label><select id="editCat"></select><div class="hint">选择后自动保存。</div></div><div class="field"><label>实际存放位置（可不填）</label><input id="editLoc" placeholder="例如：A柜-2层-03号"></div><div class="field"><label>备注（可不填）</label><textarea id="editNote" placeholder="可记录瓶子大小、特殊标识等"></textarea><div class="hint">输入内容自动保存，重新打开仍保留。</div></div><div class="actions"><button onclick="closeSheet('editMask')">关闭</button><button id="backBtn" onclick="markPending()">改回待分类</button><button class="savebtn" onclick="classify()">保存并标记已分类</button></div></div></div>
<div id="toolsMask" class="mask" onclick="maskClose(event,'toolsMask')"><div class="sheet"><div class="handle"></div><h2 style="margin-top:0">数据管理</h2><div class="tools"><button class="tool" onclick="exportJSON()"><b>导出备份</b><span>保存全部历史记录</span></button><button class="tool" onclick="fileInput.click()"><b>导入备份</b><span>换手机后恢复</span></button><button class="tool" onclick="exportCSV()"><b>导出表格</b><span>可用Excel打开</span></button><button class="tool" onclick="resetAll()"><b>恢复初始</b><span>清空分类记录</span></button></div><input id="fileInput" class="hidden" type="file" accept=".json" onchange="importJSON(event)"><div class="field"><div class="hint" style="font-size:14px;line-height:1.7">类别、位置、备注均自动保存。数据同时写入浏览器本地存储和 IndexedDB；正常使用同一浏览器重新打开不会丢失。换手机或清除浏览器数据前请导出备份。</div></div><button class="btn" style="width:100%" onclick="closeSheet('toolsMask')">关闭</button></div></div><div id="toast" class="toast"></div>
<script src="./data-01.js?v=clean1"></script><script src="./data-02.js?v=clean1"></script><script src="./data-03.js?v=clean1"></script><script src="./data-04.js?v=clean1"></script><script src="./data-05.js?v=clean1"></script><script src="./data-06.js?v=clean1"></script><script src="./data-07.js?v=clean1"></script><script src="./data-08.js?v=clean1"></script><script src="./data-09.js?v=clean1"></script><script src="./data-10.js?v=clean1"></script><script>
const CAT=['根及根茎类','茎木类','皮类','叶类','花类','果实及种子类','全草类','藻、菌、地衣类','动物类','矿物类','树脂类'];const SRC=['全部来源','需要再找（有位置）','未找到且无位置','已装瓶待分类'];const KEY='specimen_state_v4',OLD=['specimen_classification_assistant_state_v3','specimen_classification_assistant_v1'];let data=[],view='pending',cat='全部',src='全部来源',timer,dbp;
const $=id=>document.getElementById(id),E=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function toast(s){$('toast').textContent=s;$('toast').classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>$('toast').classList.remove('show'),1600)}function base(){return SPECIMEN_DATA.map(x=>({id:x[0],name:x[1],suggestedCategory:x[2],sourceStatus:x[3],originalPositions:x[4],searchKey:x[5],category:'',location:'',note:'',classified:false,updatedAt:0}))}function parse(s){try{let x=JSON.parse(s);if(Array.isArray(x))return{items:x,updatedAt:0};if(x&&Array.isArray(x.items))return x}catch(e){}return null}function merge(st){let m=new Map((st?.items||[]).map(x=>[x.name,x]));return base().map(b=>{let o=m.get(b.name);return o?{...b,category:o.category||'',location:o.location||'',note:o.note||'',classified:!!o.classified,updatedAt:+o.updatedAt||0}:b})}
function db(){if(dbp)return dbp;dbp=new Promise(r=>{if(!indexedDB)return r(null);let q=indexedDB.open('specimen_db',1);q.onupgradeneeded=()=>q.result.createObjectStore('s');q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});return dbp}async function dbRead(){let d=await db();if(!d)return null;return new Promise(r=>{let q=d.transaction('s').objectStore('s').get('current');q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null)})}async function dbWrite(st){let d=await db();if(!d)return;return new Promise(r=>{let t=d.transaction('s','readwrite');t.objectStore('s').put(st,'current');t.oncomplete=r;t.onerror=r})}function state(){return{version:4,updatedAt:Date.now(),items:data}}async function persist(show=true){clearTimeout(timer);let st=state();try{localStorage.setItem(KEY,JSON.stringify(st))}catch(e){}await dbWrite(st);if(show)$('save').textContent='已自动保存 · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}function autosave(){ $('save').textContent='正在自动保存…';clearTimeout(timer);timer=setTimeout(()=>persist(),180)}async function init(){let l=parse(localStorage.getItem(KEY));for(let k of OLD)if(!l)l=parse(localStorage.getItem(k));let d=await dbRead(),st=(!l?d:!d?l:(+d.updatedAt>+l.updatedAt?d:l));data=merge(st);await persist(false);$('save').textContent='已自动保存 · 历史数据已恢复';render()}
function chips(){ $('cats').innerHTML=['全部',...CAT].map(x=>`<button class="chip ${x===cat?'on':''}" onclick="cat='${x}';render()">${E(x)}</button>`).join('');$('sources').innerHTML=SRC.map(x=>`<button class="chip ${x===src?'on':''}" onclick="src='${x}';render()">${E(x)}</button>`).join('')}function setView(v){view=v;document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('on',x.dataset.v===v));$('viewTitle').textContent={pending:'待分类',done:'已分类',all:'全部查找',location:'按存放位置'}[v];render()}function arr(){let q=$('q').value.trim().toLowerCase(),a=data.slice();if(view==='pending')a=a.filter(x=>!x.classified);if(view==='done'||view==='location')a=a.filter(x=>x.classified);if(cat!=='全部')a=a.filter(x=>(x.category||x.suggestedCategory)===cat);if(src!=='全部来源')a=a.filter(x=>x.sourceStatus===src);if(q)a=a.filter(x=>[x.name,x.searchKey,x.category,x.suggestedCategory,x.location,x.note,x.sourceStatus].join(' ').toLowerCase().includes(q));a.sort(view==='location'?(a,b)=>(a.location||'未填写').localeCompare(b.location||'未填写','zh-CN')||a.id-b.id:(a,b)=>a.id-b.id);return a}function render(){let done=data.filter(x=>x.classified).length;$('total').textContent=data.length;$('pending').textContent=data.length-done;$('done').textContent=done;chips();let a=arr();$('count').textContent='共 '+a.length+' 种';$('list').innerHTML=a.length?a.map(x=>`<article class="card"><div class="ctop"><div><div class="name">${E(x.name)}</div><div class="src">${E(x.sourceStatus)}</div></div><span class="tag ${x.classified?'done':'pending'}">${x.classified?'已分类':'待分类'}</span></div><div class="meta"><b>类别：</b>${E(x.category||x.suggestedCategory||'未设置')}${!x.category?'（建议）':''}<br><b>位置：</b>${E(x.location||'未填写')}${x.note?'<br><b>备注：</b>'+E(x.note):''}</div><button class="primary" onclick="edit(${x.id})">分类上架</button></article>`).join(''):'<div class="empty">没有符合条件的品种</div>'} $('q').addEventListener('input',render);
function item(){return data.find(x=>x.id===+$('editId').value)}function edit(id){let x=data.find(x=>x.id===id);$('editId').value=id;$('editName').textContent=x.name;$('suggest').textContent='建议类别：'+(x.suggestedCategory||'未设置')+'；来源：'+x.sourceStatus;$('editCat').value=x.category||x.suggestedCategory||'';$('editLoc').value=x.location||'';$('editNote').value=x.note||'';$('backBtn').style.display=x.classified?'block':'none';$('editMask').classList.add('show')}function draft(){let x=item();if(!x)return;x.category=$('editCat').value;x.location=$('editLoc').value.trim();x.note=$('editNote').value.trim();x.updatedAt=Date.now();autosave();render()}['editCat','editLoc','editNote'].forEach(id=>$(id).addEventListener(id==='editCat'?'change':'input',draft));async function classify(){let x=item();if(!$('editCat').value)return toast('请选择药材类别');draft();x.classified=true;x.updatedAt=Date.now();await persist();closeSheet('editMask');render();toast('已保存并标记已分类')}async function markPending(){let x=item();x.classified=false;x.updatedAt=Date.now();await persist();closeSheet('editMask');render();toast('已改回待分类')}function openTools(){$('toolsMask').classList.add('show')}function closeSheet(id){$(id).classList.remove('show')}function maskClose(e,id){if(e.target.id===id)closeSheet(id)}function dl(n,c,t){let a=document.createElement('a'),b=new Blob([c],{type:t});a.href=URL.createObjectURL(b);a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function exportJSON(){dl('标本分类助手备份.json',JSON.stringify(state(),null,2),'application/json');toast('备份已导出')}function exportCSV(){let r=[['序号','品名','原清单状态','建议类别','确认类别','存放位置','分类状态','备注']];data.forEach(x=>r.push([x.id,x.name,x.sourceStatus,x.suggestedCategory,x.category,x.location,x.classified?'已分类':'待分类',x.note]));dl('标本分类记录.csv','﻿'+r.map(x=>x.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\r\n'),'text/csv');toast('表格已导出')}function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=async()=>{let st=parse(r.result);if(!st)return toast('备份格式不正确');data=merge(st);await persist();render();closeSheet('toolsMask');toast('备份已导入')};r.readAsText(f);e.target.value=''}async function resetAll(){if(!confirm('确定清空全部分类记录吗？'))return;data=base();await persist();render();closeSheet('toolsMask');toast('已恢复初始数据')}$('editCat').innerHTML='<option value="">请选择类别</option>'+CAT.map(x=>`<option>${E(x)}</option>`).join('');document.addEventListener('visibilitychange',()=>{if(document.hidden)persist(false)});window.addEventListener('pagehide',()=>persist(false));setInterval(()=>data.length&&persist(false),5000);if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});if(window.caches)caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).catch(()=>{});}init();
</script>
