<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>标本数据云端恢复</title><style>body{font-family:system-ui,"Microsoft YaHei",sans-serif;max-width:680px;margin:auto;padding:20px;background:#f5f7f5;color:#111827}h1{color:#14532d}label{display:block;font-weight:700;margin:14px 0 6px}input{width:100%;box-sizing:border-box;padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:16px}button{width:100%;margin-top:16px;padding:13px;border:0;border-radius:10px;background:#166534;color:#fff;font-weight:700;font-size:16px}.secondary{background:#374151}.box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-top:16px}.ok{color:#166534}.bad{color:#b91c1c}.hint{font-size:13px;color:#6b7280;line-height:1.6}</style></head><body><h1>标本数据云端恢复</h1><p class="hint">这个页面只读取云端数据，不会向云端写入。请填写你之前启用同步时使用的同一套 Supabase 信息和同步密码。</p><div class="box"><label>Supabase 项目网址</label><input id="url" placeholder="https://xxxx.supabase.co"><label>Publishable / anon key</label><input id="key" type="password" placeholder="sb_publishable_... 或 anon key"><label>同步密码</label><input id="code" type="password" placeholder="必须和之前完全一致"><button id="recover">从云端读取并恢复</button><button id="download" class="secondary" style="display:none">下载恢复备份</button><div id="status" class="hint" style="margin-top:14px"></div></div><script>
const $=id=>document.getElementById(id);let recovered=null;
function b64ToBytes(v){const b=atob(v),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function shaHex(t){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return[...new Uint8Array(d)].map(x=>x.toString(16).padStart(2,'0')).join('')}
async function aesKey(code,syncId){const m=await crypto.subtle.importKey('raw',new TextEncoder().encode(code),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('specimen-sync-v1:'+syncId),iterations:180000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['decrypt'])}
async function decryptCloud(payload,code,syncId){const p=JSON.parse(payload),k=await aesKey(code,syncId),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(p.iv)},k,b64ToBytes(p.cipher));return JSON.parse(new TextDecoder().decode(plain))}
async function saveLocal(state){const st={version:4,updatedAt:Date.now(),items:state.items};localStorage.setItem('specimen_state_v4',JSON.stringify(st));localStorage.setItem('specimen_cloud_config_v1',JSON.stringify({url:$('url').value.trim().replace(/\/+$/,''),key:$('key').value.trim(),code:$('code').value}));await new Promise((resolve,reject)=>{const q=indexedDB.open('specimen_db',1);q.onupgradeneeded=()=>{if(!q.result.objectStoreNames.contains('s'))q.result.createObjectStore('s')};q.onerror=()=>reject(q.error);q.onsuccess=()=>{const db=q.result,t=db.transaction('s','readwrite');t.objectStore('s').put(st,'current');t.oncomplete=()=>{db.close();resolve()};t.onerror=()=>reject(t.error)}})}
$('recover').onclick=async()=>{const url=$('url').value.trim().replace(/\/+$/,''),key=$('key').value.trim(),code=$('code').value;if(!/^https:\/\/.+\.supabase\.co$/i.test(url))return $('status').innerHTML='<span class="bad">项目网址格式不正确</span>';if(key.length<20)return $('status').innerHTML='<span class="bad">Publishable / anon key 不完整</span>';if(code.length<8)return $('status').innerHTML='<span class="bad">同步密码至少8位</span>';$('status').textContent='正在读取云端，请稍候…';try{const syncId=await shaHex('specimen-id:'+code),headers={'Content-Type':'application/json',apikey:key};if(!key.startsWith('sb_publishable_'))headers.Authorization='Bearer '+key;const r=await fetch(url+'/rest/v1/rpc/get_specimen_blob',{method:'POST',headers,body:JSON.stringify({p_sync_id:syncId})}),text=await r.text();if(!r.ok)throw new Error(text||('HTTP '+r.status));const got=text?JSON.parse(text):null,row=Array.isArray(got)?got[0]:got;if(!row)throw new Error('云端没有找到这组同步密码对应的数据');recovered=await decryptCloud(row.payload,code,syncId);if(!recovered||!Array.isArray(recovered.items))throw new Error('云端数据格式不正确');const done=recovered.items.filter(x=>x.classified).length,withLoc=recovered.items.filter(x=>x.location).length;await saveLocal(recovered);$('download').style.display='block';$('status').innerHTML='<span class="ok"><b>恢复成功：</b>'+recovered.items.length+'个品种，已分类'+done+'个，填写位置'+withLoc+'个。</span><br>现在请打开应急标本助手页面，数据会直接出现。';}catch(e){console.error(e);$('status').innerHTML='<span class="bad"><b>恢复失败：</b>'+String(e.message||e)+'</span><br>常见原因：项目网址、密钥或同步密码与之前不一致。'}};
$('download').onclick=()=>{if(!recovered)return;const a=document.createElement('a'),b=new Blob([JSON.stringify({version:4,updatedAt:Date.now(),items:recovered.items},null,2)],{type:'application/json'});a.href=URL.createObjectURL(b);a.download='标本分类助手_云端恢复备份.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};
</script></body></html>
